[feeder]
mode = "live"
feed_brokers = ["ANGELONE"]

[brokers]
config_dir = "brokers"

[admin]
enabled = true
bind_addr = "127.0.0.1:8787"

[master_scheduler]
enabled = true
time_ist = "08:00"
weekdays_only = false

[login_scheduler]
enabled = true
time_ist = "07:55"
weekdays_only = false

[[market_sessions]]
id = "NSE_BSE"
exchanges = ["NSE", "NFO", "BSE", "BFO"]
timezone = "Asia/Kolkata"
open = "09:15"
close = "15:30"
connect_before_open_secs = 300
weekdays_only = true

[[market_sessions]]
id = "INDIA_CURRENCY"
exchanges = ["CDS"]
timezone = "Asia/Kolkata"
open = "09:00"
close = "17:00"
connect_before_open_secs = 300
weekdays_only = true

[[market_sessions]]
id = "MCX"
exchanges = ["MCX"]
timezone = "Asia/Kolkata"
open = "09:00"
close = "23:30"
connect_before_open_secs = 300
weekdays_only = true

[[market_sessions]]
id = "NCDEX"
exchanges = ["NCDEX", "NCO"]
timezone = "Asia/Kolkata"
open = "09:00"
close = "17:00"
connect_before_open_secs = 300
weekdays_only = true

[[market_sessions]]
id = "CRYPTO"
exchanges = ["DELTA"]
timezone = "UTC"
always_open = true

[channels]
price_tick = true
price_candles = []

[backtest]
historical_candles_sqlite_path = "runtime/backtest_historical_candles.sqlite"

[historical_candles]
enabled = true
sqlite_path = "runtime/historical_candles.sqlite"
one_minute_days = 240
one_day_days = 300
maintenance_time_ist = "00:10"
reconcile_one_minute_days = 2
reconcile_one_day_days = 5

[strategy]
enabled = true
sqlite_path = "runtime/strategy.sqlite"
warmup_bars = 1000
recent_bars = 1000

[runtime]
max_events = 0
