name: Build Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  linux-amd64:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install Rust
        run: rustup toolchain install stable --profile minimal --target x86_64-unknown-linux-gnu

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install --yes pkg-config libssl-dev

      - name: Check
        run: cargo check --locked --bin dhancred-trading-app

      - name: Test
        run: cargo test --locked

      - name: Build package
        run: scripts/build-linux-amd64.sh

      - name: Publish latest release
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: latest
          ASSET_PATH: target/deploy/dhancred-trading-app-linux-amd64.tar.gz
        run: |
          set -euo pipefail
          git tag -f "$RELEASE_TAG" "$GITHUB_SHA"
          git push -f origin "$RELEASE_TAG"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "$ASSET_PATH" --clobber
            gh release edit "$RELEASE_TAG" \
              --target "$GITHUB_SHA" \
              --title "Latest DhanCred Trading App" \
              --notes "Automated Linux AMD64 build for $GITHUB_SHA"
          else
            gh release create "$RELEASE_TAG" "$ASSET_PATH" \
              --target "$GITHUB_SHA" \
              --title "Latest DhanCred Trading App" \
              --notes "Automated Linux AMD64 build for $GITHUB_SHA"
          fi
